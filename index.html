<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한양전공 TV 슬라이드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    cursor: none;
  }

  #stage {
    position: absolute; inset: 0;
    transform: scale(1.012);
    transition: translate 2s ease-in-out;
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .slide.active { opacity: 1; }
  .slide img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  .slide iframe {
    width: 100%; height: 100%;
    border: 0; background: #fff;
  }
  .slide.black { background: #000; }

  #dimmer {
    position: absolute; inset: 0;
    background: #000; opacity: 0;
    transition: opacity 3s ease;
    pointer-events: none; z-index: 50;
  }

  #clock {
    position: absolute; right: 3vw; bottom: 3vh;
    z-index: 60; text-align: right;
    color: rgba(255,255,255,.85);
    text-shadow: 0 2px 8px rgba(0,0,0,.7);
    transition: right 2s ease, bottom 2s ease, left 2s ease, top 2s ease;
  }
  #clock .time { font-size: 4.5vw; font-weight: 700; letter-spacing: .02em; }
  #clock .date { font-size: 1.6vw; opacity: .8; margin-top: .2em; }

  #status {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 70; color: #888; font-size: 1.8vw;
    text-align: center; display: none;
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="dimmer"></div>
  <div id="clock"><div class="time"></div><div class="date"></div></div>
  <div id="status">config을 불러오는 중…</div>

  <div id="tvPicker" style="position:fixed;inset:0;background:#12213f;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;">
    <div style="font-size:2.4vw;color:#fff;margin-bottom:0.4em;">📺 이 TV는 몇 번인가요?</div>
    <div style="font-size:1.2vw;color:#9fb3d0;margin-bottom:2em;">리모컨으로 선택하세요. 한 번만 고르면 계속 기억합니다.</div>
    <div id="tvBtns" style="display:flex;gap:2vw;"></div>
    <div style="font-size:1vw;color:#6b7d99;margin-top:2.5em;">나중에 변경: 화면을 길게 누르거나 주소 뒤에 ?reset 을 붙여 새로고침</div>
  </div>

<script>
const stage  = document.getElementById('stage');
const dimmer = document.getElementById('dimmer');
const clockEl = document.getElementById('clock');
const statusEl = document.getElementById('status');

let config = null;
let playlist = [];
let currentDim = 0;
let slideIndex = -1;
let slideTimer = null;
let activeEl = null;

const TV_COUNT = 2;
let configFile = 'config.json';

function getConfigFileForTv(n) { return 'config-' + n + '.json'; }

function resolveTvNumber() {
  const params = new URLSearchParams(location.search);
  if (params.has('reset')) { try { localStorage.removeItem('tv_number'); } catch (e) {} }
  const urlTv = params.get('tv');
  if (urlTv && /^[0-9]+$/.test(urlTv)) { try { localStorage.setItem('tv_number', urlTv); } catch (e) {} return urlTv; }
  try { const saved = localStorage.getItem('tv_number'); if (saved) return saved; } catch (e) {}
  return null;
}

async function loadConfig() {
  try {
    const res = await fetch(configFile + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    config = await res.json();
    statusEl.style.display = 'none';
    applySchedule(true);
  } catch (e) {
    console.error('config 로드 실패:', e);
    if (!config) { statusEl.textContent = configFile + ' 로드 실패 — 네트워크 확인 필요'; statusEl.style.display = 'block'; }
  }
}

function nowHM() { const d = new Date(); return { day: d.getDay(), hm: d.getHours() * 60 + d.getMinutes() }; }
function toMin(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; }

function matchSchedule() {
  if (!config || !config.schedules) return null;
  const { day, hm } = nowHM();
  for (const sc of config.schedules) {
    if (sc.days && !sc.days.includes(day)) continue;
    const s = toMin(sc.start), e = toMin(sc.end);
    const inRange = s <= e ? (hm >= s && hm < e) : (hm >= s || hm < e);
    if (inRange) return sc;
  }
  return config.default || null;
}

function applySchedule(force) {
  const sc = matchSchedule();
  const newList = sc ? (sc.slides || []) : [];
  const newDim = sc && sc.dim ? sc.dim : 0;
  const changed = JSON.stringify(newList) !== JSON.stringify(playlist) || newDim !== currentDim;
  if (!changed && !force) return;
  playlist = newList; currentDim = newDim; dimmer.style.opacity = currentDim;
  slideIndex = -1;
  if (slideTimer) clearTimeout(slideTimer);
  nextSlide();
}

function nextSlide() {
  if (!playlist.length) { showElement(makeBlack()); slideTimer = setTimeout(nextSlide, 60000); return; }
  slideIndex = (slideIndex + 1) % playlist.length;
  const slide = playlist[slideIndex];
  const dur = (slide.duration || config.defaultDuration || 15) * 1000;
  let el;
  if (slide.type === 'image') el = makeImage(slide);
  else if (slide.type === 'url') el = makeFrame(slide);
  else el = makeBlack();
  showElement(el);
  slideTimer = setTimeout(nextSlide, dur);
}

function makeImage(slide) {
  const div = document.createElement('div'); div.className = 'slide';
  const img = document.createElement('img');
  if (slide.fit) img.style.objectFit = slide.fit; else if (config.fit) img.style.objectFit = config.fit;
  img.onerror = () => { div.classList.add('black'); img.remove(); };
  img.src = slide.src + (slide.src.startsWith('http') ? '' : '?t=' + Math.floor(Date.now() / 600000));
  div.appendChild(img); return div;
}
function makeFrame(slide) {
  const div = document.createElement('div'); div.className = 'slide';
  const f = document.createElement('iframe'); f.src = slide.src; f.setAttribute('scrolling', 'no');
  div.appendChild(f); return div;
}
function makeBlack() { const div = document.createElement('div'); div.className = 'slide black'; return div; }

function showElement(el) {
  stage.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('active')));
  const prev = activeEl; activeEl = el;
  if (prev) { prev.classList.remove('active'); setTimeout(() => prev.remove(), 1500); }
}

function pixelShift() {
  if (config && config.pixelShift === false) return;
  const x = (Math.random() * 16 - 8).toFixed(1);
  const y = (Math.random() * 16 - 8).toFixed(1);
  stage.style.translate = `${x}px ${y}px`;
}

const CLOCK_POS = [
  { right: '3vw', bottom: '3vh', left: 'auto', top: 'auto' },
  { left: '3vw', bottom: '3vh', right: 'auto', top: 'auto' },
  { right: '3vw', top: '3vh', left: 'auto', bottom: 'auto' },
  { left: '3vw', top: '3vh', right: 'auto', bottom: 'auto' },
];
let clockPosIdx = 0;

function updateClock() {
  if (config && config.clock === false) { clockEl.style.display = 'none'; return; }
  clockEl.style.display = 'block';
  const d = new Date();
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  clockEl.querySelector('.time').textContent = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  clockEl.querySelector('.date').textContent = `${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function moveClock() { clockPosIdx = (clockPosIdx + 1) % CLOCK_POS.length; Object.assign(clockEl.style, CLOCK_POS[clockPosIdx]); }

function showTvPicker() {
  const picker = document.getElementById('tvPicker');
  const btns = document.getElementById('tvBtns');
  btns.innerHTML = '';
  for (let i = 1; i <= TV_COUNT; i++) {
    const b = document.createElement('button');
    b.textContent = i + '번 TV';
    b.tabIndex = 0;
    b.style.cssText = 'font-size:2vw;padding:1em 2.5em;border:0;border-radius:12px;background:#2e5aa0;color:#fff;cursor:pointer;font-family:inherit;outline:3px solid transparent;';
    b.onfocus = () => b.style.outlineColor = '#c9a34e';
    b.onblur = () => b.style.outlineColor = 'transparent';
    b.onclick = () => { try { localStorage.setItem('tv_number', String(i)); } catch (e) {} picker.style.display = 'none'; startSlideshow(String(i)); };
    btns.appendChild(b);
  }
  picker.style.display = 'flex';
  setTimeout(() => btns.firstChild && btns.firstChild.focus(), 100);
}

let pressTimer = null;
document.body.addEventListener('pointerdown', () => { pressTimer = setTimeout(() => { try { localStorage.removeItem('tv_number'); } catch (e) {} location.reload(); }, 5000); });
document.body.addEventListener('pointerup', () => clearTimeout(pressTimer));

function startSlideshow(tvNum) {
  configFile = getConfigFileForTv(tvNum);
  loadConfig();
  setInterval(loadConfig, 10 * 60 * 1000);
  setInterval(() => applySchedule(false), 30 * 1000);
  setInterval(pixelShift, 60 * 1000);
  setInterval(moveClock, 10 * 60 * 1000);
  setInterval(() => { const d = new Date(); if (d.getHours() === 4 && d.getMinutes() === 0) location.reload(); }, 60 * 1000);
}

setInterval(updateClock, 1000);
updateClock();

const tvNum = resolveTvNumber();
if (tvNum) { startSlideshow(tvNum); } else { showTvPicker(); }
</script>
</body>
</html>
